name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          pip install flake8
          pip install -r src/blog-news/requirements.txt
      - name: Rodar flake8
        run: flake8 src/blog-news/ --max-line-length=120 --exclude=__pycache__
